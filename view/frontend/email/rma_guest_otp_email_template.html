<!--@vars {
    "var otp": "One-Time Password"
} @-->

<!--@subject {{trans "Your OTP Code for RMA Access"}} @-->

<!-- Wrapper -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 24px;">
  <tr>
    <td align="center">

      <!-- Card -->
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="background: #ffffff; border-radius: 8px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
        <tr>
          <td>

            <!-- Header -->
            <h2 style="margin: 0 0 16px 0; font-size: 22px; color: #333;">Your OTP for RMA Access</h2>

            <!-- Body -->
            <p style="font-size: 15px; color: #555555; line-height: 1.6; margin-bottom: 20px;">
              To securely access your return request page, please use the following One-Time Password (OTP):
            </p>

            <!-- OTP Box -->
            <p style="font-size: 24px; color: #000000; font-weight: bold; background: #f0f0f0; padding: 12px 20px; border-radius: 6px; display: inline-block; letter-spacing: 2px; margin: 16px 0;">
              {{var otp}}
            </p>

            <!-- Note -->
            <p style="font-size: 14px; color: #888888; line-height: 1.5; margin-top: 24px;">
              This code is valid for a limited time. If you did not request this OTP, please disregard this email.
            </p>

            <!-- Signature -->
            <p style="font-size: 14px; color: #333333; line-height: 1.4; margin-top: 32px;">
              Thank you,<br>
              <strong style="color: #000;">Customer Support Team</strong>
            </p>

          </td>
        </tr>
      </table>
      <!-- /Card -->

    </td>
  </tr>
</table>
<!-- /Wrapper -->
